<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main-section {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .blue-frame {
        position: relative;
        width: 400px;
        height: 250px;

    }

    .blue-frame::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        border: 5px solid #2d7df6;
        transition: all 0.5s ease;
        
    }

    .blue-frame:hover::before{
        top: 20px;
        left: 20px;
        right: 20px;
        bottom: 20px;
    }

    .main-image{
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    


    .graphic {
        position: absolute;
        top: 30px;
        right: 30px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        z-index: 2;
    }

    .graphic-line {
        width: 80px;
        height: 3px;
        background-color: #e5e7f1;
        margin-bottom: 5px;
    }

    .graphic-circle {
        width: 30px;
        height: 30px;
        border: 3px solid #e5e7f1;
        border-radius: 50%;
        margin-right: 10px;
    }

    .main-image {
        position: absolute;
        bottom: 0;
        right: 0;
        width: 85%;
        height: 65%;
        object-fit: cover;
        z-index: 2;
        filter: grayscale(100%) sepia(100%) hue-rotate(190deg) saturate(400%) contrast(1.2);
    }

    .title-kamui {
        position: absolute;
        top: 50%;
        left: 0;
        transform: translateY(-50%);
        font-size: 2.5rem;
        font-weight: 900;
        letter-spacing: 8px;
        color: #000;
        z-index: 5;
    }
    .large-number {
        position: absolute;
        bottom: -25px;
        left: 15%;
        font-size: 4.5rem;
        font-weight: bold;
        color: #e2e4ef;
        z-index: 5;
        letter-spacing: 10px;
    }

    </style>
</head>
<body>
    <main class="main-section">
        <div class="blue-frame">
            <div class="graphic">
                <div class="graphic-line"></div>
                <div class="graphic-circle"></div>
            </div>
            
            <img src="" alt="main-image" class="main-image">
        </div>

        <h1 class="title-kamui">KAMUI</h1>
        <div class="large-number">0 1</div>
    </main>
</body>
</html>
